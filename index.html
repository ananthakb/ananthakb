<script>
  /* Theme bootstrap — runs before paint */
  (function () {
    var t = localStorage.getItem('theme');
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (t === 'dark' || (!t && prefersDark)) {
      document.documentElement.classList.add('dark');
    }
  })();
</script>

<style>
  .page { min-height: 100vh; display: flex; flex-direction: column; }

  /* Top bar — hosts the wavy animation between name and theme toggle */
  .top {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: var(--space-3);
    padding-top: var(--space-3);
    padding-bottom: var(--space-3);
    border-bottom: 1px solid var(--line-soft);
  }
  .top .id { display: flex; flex-direction: column; gap: 2px; }
  .top .id .name {
    font-family: var(--font-mono); font-size: var(--step--1);
    color: var(--ink); letter-spacing: 0.04em;
  }

  /* Gaussian Wave Packet */
  .squiggle-wrap {
    display: flex; align-items: center;
    overflow: hidden; min-height: 60px; flex: 1;
  }
  #waveCanvas {
    width: 100%; height: 60px; display: block;
  }

  /* Hero */
  .hero {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-4);
    padding-top: var(--space-5);
    padding-bottom: var(--space-5);
  }
  @media (min-width: 800px) {
    .hero { grid-template-columns: 1.1fr 1fr; align-items: center; }
  }
  .hero-text h1 {
    font-family: var(--font-sans); font-weight: 400;
    font-size: var(--step-4); line-height: 1.05;
    letter-spacing: -0.025em; margin: 0; color: var(--ink);
  }

  /* Game of Life */
  .gol-wrap {
    position: relative;
    aspect-ratio: 1 / 1;
    width: 100%;
    max-width: 420px;
    justify-self: center;
  }
  .gol-wrap canvas {
    width: 100%; height: 100%; display: block;
    border: 1px solid var(--line-soft);
    border-radius: 4px;
    background: var(--bg-card);
  }
  .gol-caption {
    position: absolute; bottom: -1.6rem; left: 0;
    font-family: var(--font-mono); font-size: var(--step--1);
    color: var(--ink-3); letter-spacing: 0.04em;
  }
  .gol-caption .pname { color: var(--ink-2); }

  /* Section heading */
  .section-head {
    display: flex; align-items: baseline; gap: var(--space-3);
    margin-bottom: var(--space-3); padding-top: var(--space-4);
    border-top: 1px solid var(--line-soft);
  }
  .section-head .num {
    font-family: var(--font-mono); font-size: var(--step--1);
    color: var(--ink-3); letter-spacing: 0.1em;
  }
  .section-head h2 {
    font-family: var(--font-sans); font-weight: 500;
    font-size: var(--step-2); margin: 0; color: var(--ink);
    letter-spacing: -0.01em;
  }

  /* Nav cards */
  .cards {
    display: grid; grid-template-columns: 1fr; gap: 1px;
    background: var(--line-soft); border: 1px solid var(--line-soft);
    border-radius: 4px; overflow: hidden;
  }
  @media (min-width: 640px) { .cards { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 900px) { .cards { grid-template-columns: 1fr 1fr 1fr; } }
  .card {
    background: var(--bg-card); padding: var(--space-3);
    display: flex; flex-direction: column; gap: var(--space-2);
    border: none; text-decoration: none; position: relative;
    transition: background 0.25s ease; min-height: 130px;
  }
  .card:hover { background: var(--bg-soft); color: inherit; }
  .card .card-num {
    font-family: var(--font-mono); font-size: var(--step--1);
    color: var(--ink-3); letter-spacing: 0.08em;
  }
  .card .card-title {
    font-family: var(--font-sans); font-weight: 500;
    font-size: var(--step-1); color: var(--ink);
    letter-spacing: -0.01em; display: flex; align-items: center; gap: 0.5rem;
  }
  .card .card-title .arrow {
    font-family: var(--font-mono); color: var(--ink-3);
    opacity: 0; transform: translateX(-4px);
    transition: opacity 0.25s, transform 0.25s, color 0.25s;
  }
  .card:hover .card-title .arrow {
    opacity: 1; transform: translateX(0); color: var(--accent);
  }

  /* Bottom */
  .bottom {
    margin-top: var(--space-4); padding-top: var(--space-3); padding-bottom: var(--space-4);
    border-top: 1px solid var(--line-soft);
    display: flex; justify-content: space-between; align-items: center;
    gap: var(--space-3); flex-wrap: wrap;
    font-family: var(--font-mono); font-size: var(--step--1); color: var(--ink-3);
  }

  .reveal { opacity: 0; transform: translateY(8px); animation: rise 0.7s ease forwards; }
  .reveal.d2 { animation-delay: 0.1s; }
  .reveal.d3 { animation-delay: 0.2s; }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  @media (prefers-reduced-motion: reduce) {
    .squiggle path { animation: none; }
    .reveal { animation: none; opacity: 1; transform: none; }
  }
</style>

  <script>
  /* ============================================================
     Gaussian Wave Packet — canvas renderer
     All tuneable parameters are in WAVE_PARAMS below.
     ============================================================ */
  (function () {
    var canvas = document.getElementById('waveCanvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');

    /* ---------- Tuneable parameters ---------- */
    var WAVE_PARAMS = {
      amplitude:   25,     // max height of the pulse (px in logical coords)
      frequency:   0.148,  // carrier sine tightness (rad/px)
      packetWidth: 2700,   // Gaussian variance — wider = broader envelope
      packetSpeed: 3.5,    // group velocity (px/frame at 60fps)
      waveSpeed:   0.15,   // phase velocity of internal wave (rad/frame)
      step:        3       // x step in pixels — lower = smoother, higher = faster
    };
    /* ----------------------------------------- */

    var DPR   = Math.max(1, window.devicePixelRatio || 1);
    var W     = 0;
    var H     = 60;
    var time  = 0;
    var center = 0;

    function getStrokeColor() {
      return getComputedStyle(document.documentElement)
        .getPropertyValue('--ink').trim() || '#222';
    }

    function resize() {
      var rect = canvas.getBoundingClientRect();
      W = rect.width;
      canvas.width  = Math.round(W * DPR);
      canvas.height = Math.round(H * DPR);
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      /* Start packet at left edge on first run */
      if (center === 0) center = -Math.sqrt(WAVE_PARAMS.packetWidth) * 3;
    }

    function drawFrame() {
      var p = WAVE_PARAMS;
      var baseY = H / 2;

      ctx.clearRect(0, 0, W, H);
      ctx.beginPath();
      ctx.strokeStyle = getStrokeColor();
      ctx.lineWidth   = 1.5;
      ctx.lineJoin    = 'round';
      ctx.lineCap     = 'round';

      var first = true;
      for (var x = 0; x <= W; x += p.step) {
        var y = baseY + (
          p.amplitude *
          Math.exp(-Math.pow(x - center, 2) / p.packetWidth) *
          Math.sin(x * p.frequency - time * p.waveSpeed)
        );
        if (first) { ctx.moveTo(x, y); first = false; }
        else        { ctx.lineTo(x, y); }
      }
      ctx.stroke();

      /* Advance time and move envelope; loop when fully off-screen right */
      time   += 1;
      center += p.packetSpeed;
      var tail = Math.sqrt(p.packetWidth) * 4; /* ~4σ is effectively zero */
      if (center - tail > W) {
        center = -tail;
      }

      requestAnimationFrame(drawFrame);
    }

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(drawFrame);

    /* Expose so theme toggle can trigger a redraw on next frame (no-op needed) */
    window.__wave = true;
  })();
  </script>

  <script>
  /* Theme toggle */
  (function () {
    var btn = document.getElementById('themeBtn');
    var label = document.getElementById('themeLabel');
    function sync() {
      var dark = document.documentElement.classList.contains('dark');
      label.textContent = dark ? 'dark' : 'light';
    }
    sync();
    btn.addEventListener('click', function () {
      document.documentElement.classList.toggle('dark');
      var dark = document.documentElement.classList.contains('dark');
      localStorage.setItem('theme', dark ? 'dark' : 'light');
      sync();
      if (window.__gol && window.__gol.refresh) window.__gol.refresh();
    });
  })();
  </script>

  <script src="gol-patterns.js"></script>

  <script>
  /* Conway's Game of Life — picks a random well-known pattern on each load */
  (function () {
    var canvas = document.getElementById('gol');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var DPR = Math.max(1, window.devicePixelRatio || 1);

    var PATTERNS = window.GOL_PATTERNS || {};

    var COLS = 64, ROWS = 64;
    var grid = makeGrid(COLS, ROWS);
    var nextGrid = makeGrid(COLS, ROWS);
    var stepDelay = 110;
    var lastStep = 0;
    var W = 0, H = 0, cellW = 0, cellH = 0;

    function makeGrid(c, r) {
      var g = new Uint8Array(c * r);
      return g;
    }
    function idx(x, y) {
      x = (x + COLS) % COLS; y = (y + ROWS) % ROWS;
      return y * COLS + x;
    }

    function loadPattern(name) {
      var pts = PATTERNS[name];
      grid.fill(0);
      // Find bbox
      var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (var i = 0; i < pts.length; i++) {
        if (pts[i][0] < minX) minX = pts[i][0];
        if (pts[i][1] < minY) minY = pts[i][1];
        if (pts[i][0] > maxX) maxX = pts[i][0];
        if (pts[i][1] > maxY) maxY = pts[i][1];
      }
      var pw = maxX - minX + 1;
      var ph = maxY - minY + 1;
      var ox = Math.floor((COLS - pw) / 2) - minX;
      var oy = Math.floor((ROWS - ph) / 2) - minY;
      for (var j = 0; j < pts.length; j++) {
        grid[idx(pts[j][0] + ox, pts[j][1] + oy)] = 1;
      }
      var nameEl = document.getElementById('golName');
      if (nameEl) nameEl.textContent = name;
    }

    function step() {
      for (var y = 0; y < ROWS; y++) {
        for (var x = 0; x < COLS; x++) {
          var n = 0;
          for (var dy = -1; dy <= 1; dy++) {
            for (var dx = -1; dx <= 1; dx++) {
              if (dx === 0 && dy === 0) continue;
              n += grid[idx(x + dx, y + dy)];
            }
          }
          var alive = grid[idx(x, y)];
          var next = 0;
          if (alive && (n === 2 || n === 3)) next = 1;
          else if (!alive && n === 3) next = 1;
          nextGrid[y * COLS + x] = next;
        }
      }
      var tmp = grid; grid = nextGrid; nextGrid = tmp;
    }

    function readColors() {
      var s = getComputedStyle(document.documentElement);
      return {
        cell: s.getPropertyValue('--ink').trim() || '#222',
        line: s.getPropertyValue('--line-soft').trim() || '#eee',
        bg:   s.getPropertyValue('--bg-card').trim() || '#fff'
      };
    }
    var COLORS = readColors();

    function resize() {
      var rect = canvas.getBoundingClientRect();
      W = rect.width; H = rect.height;
      canvas.width = Math.round(W * DPR);
      canvas.height = Math.round(H * DPR);
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      cellW = W / COLS; cellH = H / ROWS;
    }

    function draw() {
      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0, 0, W, H);

      // subtle grid
      ctx.strokeStyle = COLORS.line;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      for (var i = 0; i <= COLS; i += 4) {
        var x = i * cellW;
        ctx.moveTo(x, 0); ctx.lineTo(x, H);
      }
      for (var j = 0; j <= ROWS; j += 4) {
        var y = j * cellH;
        ctx.moveTo(0, y); ctx.lineTo(W, y);
      }
      ctx.stroke();

      ctx.fillStyle = COLORS.cell;
      var pad = Math.max(0.5, cellW * 0.12);
      for (var y2 = 0; y2 < ROWS; y2++) {
        for (var x2 = 0; x2 < COLS; x2++) {
          if (grid[y2 * COLS + x2]) {
            ctx.fillRect(x2 * cellW + pad, y2 * cellH + pad, cellW - pad * 2, cellH - pad * 2);
          }
        }
      }
    }

    function tick(ts) {
      if (ts - lastStep > stepDelay) { step(); lastStep = ts; }
      draw();
      requestAnimationFrame(tick);
    }

    function pickAndLoad() {
      var names = Object.keys(PATTERNS);
      var name = names[Math.floor(Math.random() * names.length)];
      loadPattern(name);
    }

    // Reload pattern when stagnant: count generations since change
    var stableCount = 0, lastChecksum = 0;
    setInterval(function () {
      var sum = 0;
      for (var k = 0; k < grid.length; k++) sum += grid[k] * (k + 1);
      if (sum === lastChecksum) stableCount++; else stableCount = 0;
      lastChecksum = sum;
      if (stableCount > 40) { stableCount = 0; pickAndLoad(); }
    }, 800);

    canvas.addEventListener('click', pickAndLoad);

    window.__gol = {
      refresh: function () { COLORS = readColors(); }
    };
    window.addEventListener('resize', resize);

    resize();
    pickAndLoad();
    requestAnimationFrame(tick);
  })();
  </script>
